<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact page versions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f3ee;
      --ink: #1c1917;
      --accent: #9c4221;
      --card: #fffcf7;
      --card-border: rgba(28, 25, 23, 0.08);
      --shadow: 0 1px 2px rgba(28, 25, 23, 0.04), 0 8px 24px rgba(28, 25, 23, 0.06);
      --shadow-hover: 0 4px 12px rgba(28, 25, 23, 0.08), 0 16px 40px rgba(28, 25, 23, 0.1);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--ink);
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(156, 66, 33, 0.07), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 100%, rgba(28, 25, 23, 0.04), transparent 50%),
        var(--bg);
    }

    .wrap {
      max-width: 42rem;
      margin: 0 auto;
      padding: clamp(2.5rem, 6vw, 4rem) clamp(1.25rem, 4vw, 2rem) 3rem;
    }

    header {
      text-align: center;
      margin-bottom: clamp(2rem, 5vw, 3rem);
      padding-bottom: clamp(1.5rem, 4vw, 2rem);
      border-bottom: 1px solid var(--card-border);
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-size: clamp(1.85rem, 4.5vw, 2.35rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0;
      color: var(--ink);
    }

    .grid {
      display: grid;
      gap: 0.85rem;
    }

    @media (min-width: 520px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 4.25rem;
      padding: 1.1rem 1.2rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition:
        transform 0.2s ease,
        box-shadow 0.25s ease,
        border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(156, 66, 33, 0.18);
    }

    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .card-num {
      font-family: "Fraunces", Georgia, serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Contact page versions</h1>
    </header>

    <nav class="grid" aria-label="Contact page versions">
      <a class="card" href="contact-v1-editorial-glass.html">
        <span class="card-num">Version 1</span>
      </a>
      <a class="card" href="contact-v2-brutalist-ribbon.html">
        <span class="card-num">Version 2</span>
      </a>
      <a class="card" href="contact-v3-organic-blobs.html">
        <span class="card-num">Version 3</span>
      </a>
      <a class="card" href="contact-v4-noir-luxury.html">
        <span class="card-num">Version 4</span>
      </a>
      <a class="card" href="contact-v5-magazine-split.html">
        <span class="card-num">Version 5</span>
      </a>
      <a class="card" href="contact-v6-kinetic-skew.html">
        <span class="card-num">Version 6</span>
      </a>
    </nav>
  </div>
</body>
</html>

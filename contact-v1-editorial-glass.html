<!-- CONTACT v1 — Editorial glass (tokens from methodology.html) -->
<!-- Phone matches footerv1 placeholder — swap tel:+15555555555 + visible digits when you have the real number. -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

  .rk-contact-v1 {
    --blue: #3498db;
    --blue-dark: #2980b9;
    --red: #e74c3c;
    --text: #1a1f26;
    --text-muted: #4d5560;
    --surface: #ffffff;
    --header-highlight: #e4f2fb;
    --radius-xl: clamp(20px, 3.2vw, 32px);
    --glass-fill: linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.58) 0%,
      rgba(228, 242, 251, 0.45) 42%,
      rgba(255, 255, 255, 0.4) 100%
    );
    --glass-border: rgba(255, 255, 255, 0.75);
    --glass-shadow:
      0 4px 28px rgba(52, 152, 219, 0.09),
      0 1px 4px rgba(26, 31, 38, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.7);
    --blur: blur(28px) saturate(1.14);
    --ease: cubic-bezier(0.33, 1, 0.68, 1);
    font-family: 'Poppins', 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(16px, 4vw, 40px);
    background: #dba523;
    isolation: isolate;
  }

  .rk-contact-v1 * { box-sizing: border-box; }

  .rk-contact-v1__grid {
    display: grid;
    gap: clamp(20px, 3vw, 28px);
    grid-template-columns: 1fr;
  }

  @media (min-width: 900px) {
    .rk-contact-v1__grid {
      grid-template-columns: minmax(280px, 1fr) minmax(0, 1.15fr);
      align-items: start;
    }
  }

  .rk-contact-v1__visual {
    position: relative;
    padding: clamp(24px, 4vw, 40px);
    border-radius: var(--radius-xl);
    background: var(--glass-fill);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    text-align: center;
  }

  .rk-contact-v1__photo-wrap {
    position: relative;
    width: min(280px, 78vw);
    aspect-ratio: 1;
    margin: 0 auto clamp(20px, 3vw, 28px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .rk-contact-v1__photo-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--red), #fff);
    z-index: 0;
    animation: rk-cv1-spin 14s linear infinite;
  }

  @keyframes rk-cv1-spin {
    to { filter: hue-rotate(360deg); }
  }

  .rk-contact-v1__photo {
    position: relative;
    z-index: 1;
    width: calc(100% - 14px);
    height: calc(100% - 14px);
    border-radius: 50%;
    object-fit: cover;
    object-position: center 22%;
    display: block;
    border: 3px solid var(--surface);
    box-sizing: border-box;
  }

  .rk-contact-v1__logo {
    width: min(200px, 55vw);
    height: auto;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 6px 20px rgba(26, 31, 38, 0.12));
  }

  .rk-contact-v1__panel {
    border-radius: var(--radius-xl);
    padding: clamp(28px, 4vw, 44px);
    background: var(--glass-fill);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }

  .rk-contact-v1__provider {
    font-size: clamp(1.05rem, 2vw, 1.25rem);
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    margin: 0 0 0.35rem;
  }

  .rk-contact-v1__eyebrow {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--red);
    margin: 0 0 0.5rem;
  }

  .rk-contact-v1__divider {
    width: 72px;
    height: 2px;
    margin: 0 0 1.25rem;
    background: linear-gradient(90deg, var(--red), var(--blue), transparent);
    border-radius: 1px;
    opacity: 0.85;
  }

  .rk-contact-v1 h1 {
    font-size: clamp(1.85rem, 3.5vw, 2.5rem);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin: 0 0 1rem;
  }

  .rk-contact-v1 h1 strong {
    font-weight: 700;
    color: var(--blue-dark);
  }

  .rk-contact-v1__lead {
    margin: 0 0 1.75rem;
    color: var(--text-muted);
    line-height: 1.75;
    max-width: 48ch;
    font-size: 1rem;
  }

  .rk-contact-v1__links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .rk-contact-v1__links a {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    padding: 0.65rem 0.85rem;
    border-radius: 14px;
    background: linear-gradient(var(--header-highlight), var(--header-highlight));
    background-size: 100% 100%;
    border: 1px solid rgba(52, 152, 219, 0.2);
    transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
  }

  .rk-contact-v1__links a:hover,
  .rk-contact-v1__links a:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(52, 152, 219, 0.18);
    outline: none;
  }

  .rk-contact-v1__address {
    margin: 0 0 1.25rem;
    color: var(--text-muted);
    line-height: 1.65;
    font-style: normal;
    max-width: 40ch;
  }

  .rk-contact-v1__map {
    position: relative;
    border-radius: clamp(16px, 2vw, 22px);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: 0 4px 24px rgba(26, 31, 38, 0.08);
    margin-bottom: 1.5rem;
    aspect-ratio: 16 / 10;
    min-height: 220px;
  }

  .rk-contact-v1__map iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .rk-contact-v1__cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 1.75rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(120deg, var(--blue-dark), var(--blue));
    box-shadow:
      0 4px 20px rgba(41, 128, 185, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.25);
    transition: transform 0.35s var(--ease), filter 0.35s var(--ease);
  }

  .rk-contact-v1__cta:hover,
  .rk-contact-v1__cta:focus-visible {
    transform: translateY(-2px) scale(1.02);
    filter: brightness(1.05);
    outline: none;
  }
</style>

<section class="rk-contact-v1" aria-label="Contact">
  <div class="rk-contact-v1__grid">
    <div class="rk-contact-v1__visual">
      <div class="rk-contact-v1__photo-wrap">
        <img
          class="rk-contact-v1__photo"
          src="https://i.postimg.cc/CM9dhPMb/Allie-Training-97.jpg"
          alt="Allie Church"
          width="560"
          height="560"
          loading="lazy"
        >
      </div>
      <img
        class="rk-contact-v1__logo"
        src="https://i.postimg.cc/QNBPSC3P/upscaled-2x-traced-unnamed.png"
        alt="Restorative Kinetics"
        width="400"
        height="120"
        loading="lazy"
      >
    </div>

    <div class="rk-contact-v1__panel">
      <p class="rk-contact-v1__provider">Allie Church</p>
      <p class="rk-contact-v1__eyebrow">Get in touch</p>
      <div class="rk-contact-v1__divider" aria-hidden="true"></div>
      <h1>Let’s move <strong>better</strong>—together.</h1>
      <p class="rk-contact-v1__lead">
        I’m Allie Church—reach out for questions, scheduling, or to book your complimentary consultation.
      </p>

      <div class="rk-contact-v1__links">
        <a href="tel:+15555555555">(555) 555-5555</a>
        <a href="mailto:restorativekinetics@gmail.com">restorativekinetics@gmail.com</a>
      </div>

      <address class="rk-contact-v1__address">
        1847 Axtell Gateway Rd<br>
        Gallatin Gateway, MT 59730
      </address>

      <div class="rk-contact-v1__map">
        <iframe
          title="Map: 1847 Axtell Gateway Rd, Gallatin Gateway, MT"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=1847+Axtell+Gateway+Rd,+Gallatin+Gateway,+MT+59730&amp;output=embed"
          allowfullscreen
        ></iframe>
      </div>

      <a
        class="rk-contact-v1__cta"
        href="mailto:restorativekinetics@gmail.com?subject=Free%2060%20min%20consult"
      >Free 60 min consult</a>
    </div>
  </div>
</section>

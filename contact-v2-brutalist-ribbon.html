<!-- CONTACT v2 — Brutalist ribbon + sharp grid -->
<!-- Phone matches footerv1 placeholder — swap when needed. -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap');

  .rk-contact-v2 {
    --ink: #0b0f14;
    --paper: #f4f1ea;
    --blue: #3498db;
    --red: #e74c3c;
    --gold: #dba523;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    max-width: 1180px;
    margin: 0 auto;
    padding: clamp(12px, 2.5vw, 28px);
    background: var(--paper);
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }

  .rk-contact-v2 * { box-sizing: border-box; }

  .rk-contact-v2::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -18%;
    width: 65%;
    height: 140%;
    background: repeating-linear-gradient(
      -12deg,
      var(--blue) 0px,
      var(--blue) 14px,
      var(--ink) 14px,
      var(--ink) 28px
    );
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
  }

  .rk-contact-v2__ribbon {
    position: relative;
    z-index: 1;
    background: var(--ink);
    color: var(--paper);
    padding: 0.85rem 1.25rem;
    margin: 0 0 clamp(20px, 3vw, 32px);
    transform: skewY(-1.2deg);
    box-shadow: 8px 8px 0 var(--red);
  }

  .rk-contact-v2__ribbon-inner {
    transform: skewY(1.2deg);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem 1.5rem;
  }

  .rk-contact-v2__ribbon h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(1.35rem, 3.2vw, 2rem);
    letter-spacing: -0.02em;
    margin: 0;
    text-transform: uppercase;
    line-height: 1.05;
  }

  .rk-contact-v2__ribbon span {
    color: var(--gold);
  }

  .rk-contact-v2__layout {
    position: relative;
    z-index: 1;
    display: grid;
    gap: clamp(18px, 2.5vw, 26px);
    grid-template-columns: 1fr;
  }

  @media (min-width: 880px) {
    .rk-contact-v2__layout {
      grid-template-columns: 1fr 1.05fr;
      align-items: stretch;
    }
  }

  .rk-contact-v2__photo-block {
    border: 4px solid var(--ink);
    background: var(--ink);
    position: relative;
    min-height: 320px;
  }

  .rk-contact-v2__photo-block img {
    width: 100%;
    height: 100%;
    min-height: 320px;
    object-fit: cover;
    object-position: center 18%;
    display: block;
    filter: grayscale(0.25) contrast(1.08);
    mix-blend-mode: normal;
  }

  .rk-contact-v2__photo-block::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(25deg, rgba(52, 152, 219, 0.35) 0%, transparent 45%, rgba(231, 76, 60, 0.25) 100%);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .rk-contact-v2__stamp {
    position: absolute;
    bottom: 14px;
    left: 14px;
    z-index: 2;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    padding: 0.5rem 0.65rem;
    text-transform: uppercase;
    border: 3px solid var(--ink);
    transform: rotate(-3deg);
  }

  .rk-contact-v2__side {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    border: 4px solid var(--ink);
    padding: clamp(20px, 3vw, 28px);
    background: #fff;
    box-shadow: 10px 10px 0 var(--blue);
  }

  .rk-contact-v2__logo-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 4px solid var(--ink);
  }

  .rk-contact-v2__logo-row img {
    width: min(160px, 42vw);
    height: auto;
    display: block;
  }

  .rk-contact-v2__meta {
    font-size: 0.9rem;
    line-height: 1.65;
    color: #2a3140;
  }

  .rk-contact-v2__meta a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-decoration-thickness: 3px;
    text-underline-offset: 3px;
    text-decoration-color: var(--red);
  }

  .rk-contact-v2__meta a:hover,
  .rk-contact-v2__meta a:focus-visible {
    background: var(--gold);
    outline: none;
  }

  .rk-contact-v2__map {
    border: 4px solid var(--ink);
    aspect-ratio: 16 / 10;
    min-height: 200px;
    position: relative;
    background: #ddd;
  }

  .rk-contact-v2__map iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    filter: grayscale(0.15) contrast(1.05);
  }

  .rk-contact-v2__cta {
    display: block;
    text-align: center;
    padding: 1.1rem 1.25rem;
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--paper);
    background: var(--red);
    border: 4px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .rk-contact-v2__cta:hover,
  .rk-contact-v2__cta:focus-visible {
    transform: translate(3px, 3px);
    box-shadow: 3px 3px 0 var(--ink);
    outline: none;
  }
</style>

<section class="rk-contact-v2" aria-label="Contact">
  <div class="rk-contact-v2__ribbon">
    <div class="rk-contact-v2__ribbon-inner">
      <h1>Allie Church <span>//</span> Contact</h1>
    </div>
  </div>

  <div class="rk-contact-v2__layout">
    <div class="rk-contact-v2__photo-block">
      <img
        src="https://i.postimg.cc/CM9dhPMb/Allie-Training-97.jpg"
        alt="Allie Church"
        width="800"
        height="1000"
        loading="lazy"
      >
      <span class="rk-contact-v2__stamp">Gallatin · MT</span>
    </div>

    <div class="rk-contact-v2__side">
      <div class="rk-contact-v2__logo-row">
        <img
          src="https://i.postimg.cc/QNBPSC3P/upscaled-2x-traced-unnamed.png"
          alt="Restorative Kinetics logo"
          width="320"
          height="96"
          loading="lazy"
        >
      </div>

      <div class="rk-contact-v2__meta">
        <p style="margin: 0 0 1rem;">
          <strong>Provider</strong><br>
          Allie Church · Restorative Kinetics
        </p>
        <p style="margin: 0 0 1rem;">
          <strong>Phone</strong><br>
          <a href="tel:+15555555555">(555) 555-5555</a>
        </p>
        <p style="margin: 0 0 1rem;">
          <strong>Email</strong><br>
          <a href="mailto:restorativekinetics@gmail.com">restorativekinetics@gmail.com</a>
        </p>
        <p style="margin: 0;">
          <strong>Studio</strong><br>
          1847 Axtell Gateway Rd, Gallatin Gateway, MT 59730
        </p>
      </div>

      <div class="rk-contact-v2__map">
        <iframe
          title="Map: 1847 Axtell Gateway Rd, Gallatin Gateway, MT"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=1847+Axtell+Gateway+Rd,+Gallatin+Gateway,+MT+59730&amp;output=embed"
          allowfullscreen
        ></iframe>
      </div>

      <a
        class="rk-contact-v2__cta"
        href="mailto:restorativekinetics@gmail.com?subject=Free%2060%20min%20consult"
      >Free 60 min consult</a>
    </div>
  </div>
</section>

<!-- CONTACT v5 — Magazine split + diagonal energy -->
<!-- Phone matches footerv1 placeholder — swap when needed. -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

  .rk-contact-v5 {
    --blue: #3498db;
    --red: #e74c3c;
    --gold: #dba523;
    --ink: #1a1f26;
    --paper: #ffffff;
    --wash: #e4f2fb;
    font-family: 'Libre Franklin', system-ui, sans-serif;
    color: var(--ink);
    max-width: 1200px;
    margin: 0 auto;
    padding: clamp(16px, 3vw, 28px);
    background: var(--paper);
    isolation: isolate;
  }

  .rk-contact-v5 * { box-sizing: border-box; }

  .rk-contact-v5__shell {
    position: relative;
    border-radius: clamp(18px, 2.5vw, 28px);
    overflow: hidden;
    min-height: min(640px, auto);
    box-shadow:
      0 4px 32px rgba(52, 152, 219, 0.1),
      0 1px 3px rgba(26, 31, 38, 0.08);
  }

  .rk-contact-v5__shell::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(115deg, var(--wash) 0%, var(--wash) 42%, transparent 42.5%),
      linear-gradient(115deg, transparent 0%, transparent 38%, rgba(219, 165, 35, 0.14) 38%, rgba(219, 165, 35, 0.14) 100%);
    z-index: 0;
    pointer-events: none;
  }

  @media (max-width: 799px) {
    .rk-contact-v5__shell::before {
      background: linear-gradient(180deg, var(--wash) 0%, var(--wash) 46%, rgba(219, 165, 35, 0.12) 100%);
    }
  }

  .rk-contact-v5__grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr;
  }

  @media (min-width: 800px) {
    .rk-contact-v5__grid {
      grid-template-columns: 1fr 1fr;
      min-height: 520px;
    }
  }

  .rk-contact-v5__visual {
    position: relative;
    padding: clamp(28px, 5vw, 48px) clamp(22px, 4vw, 40px);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 1.5rem;
  }

  @media (min-width: 800px) {
    .rk-contact-v5__visual {
      padding-right: 8%;
    }
  }

  .rk-contact-v5__logo {
    width: min(200px, 55vw);
    height: auto;
    position: relative;
    z-index: 2;
  }

  .rk-contact-v5__photo-cut {
    position: relative;
    width: 100%;
    max-width: 380px;
    aspect-ratio: 1;
    align-self: center;
  }

  @media (min-width: 800px) {
    .rk-contact-v5__photo-cut {
      align-self: flex-end;
      margin-right: -6%;
    }
  }

  .rk-contact-v5__photo-cut::before {
    content: '';
    position: absolute;
    inset: -12% -8% 8% 8%;
    background: linear-gradient(145deg, var(--blue), var(--red));
    opacity: 0.18;
    transform: rotate(-8deg);
    border-radius: 47% 53% 52% 48% / 42% 48% 52% 58%;
    z-index: 0;
    animation: rk-cv5-blob 10s ease-in-out infinite alternate;
  }

  @keyframes rk-cv5-blob {
    from { border-radius: 47% 53% 52% 48% / 42% 48% 52% 58%; transform: rotate(-8deg) scale(1); }
    to { border-radius: 55% 45% 48% 52% / 52% 42% 58% 48%; transform: rotate(-5deg) scale(1.03); }
  }

  .rk-contact-v5__photo-cut img {
    position: relative;
    z-index: 1;
    width: 88%;
    height: 88%;
    object-fit: cover;
    object-position: center 18%;
    display: block;
    margin: 6% auto;
    clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
    box-shadow: 0 20px 50px rgba(26, 31, 38, 0.18);
    transition: clip-path 0.6s cubic-bezier(0.33, 1, 0.68, 1), transform 0.6s cubic-bezier(0.33, 1, 0.68, 1);
  }

  .rk-contact-v5__photo-cut:hover img,
  .rk-contact-v5__photo-cut:focus-within img {
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    transform: scale(1.02);
  }

  .rk-contact-v5__panel {
    padding: clamp(28px, 5vw, 48px) clamp(22px, 4vw, 44px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  @media (min-width: 800px) {
    .rk-contact-v5__panel {
      border-left: 1px solid rgba(52, 152, 219, 0.12);
    }
  }

  .rk-contact-v5__kicker {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin: 0 0 0.75rem;
  }

  .rk-contact-v5__panel h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 4vw, 2.75rem);
    font-weight: 600;
    line-height: 1.08;
    margin: 0 0 1rem;
    letter-spacing: -0.02em;
  }

  .rk-contact-v5__panel h1 em {
    font-style: italic;
    color: var(--blue);
  }

  .rk-contact-v5__panel > p.lead {
    margin: 0 0 1.5rem;
    color: #4d5560;
    line-height: 1.7;
    font-size: 1rem;
    max-width: 40ch;
  }

  .rk-contact-v5__row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem 1rem;
    margin-bottom: 1.25rem;
  }

  .rk-contact-v5__row a {
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid var(--gold);
    padding-bottom: 2px;
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .rk-contact-v5__row a:hover,
  .rk-contact-v5__row a:focus-visible {
    color: var(--blue);
    border-bottom-color: var(--blue);
    outline: none;
  }

  .rk-contact-v5__address {
    margin: 0 0 1.25rem;
    font-style: normal;
    color: #4d5560;
    line-height: 1.65;
    font-size: 0.95rem;
  }

  .rk-contact-v5__map {
    position: relative;
    border-radius: clamp(12px, 1.5vw, 18px);
    overflow: hidden;
    border: 1px solid rgba(26, 31, 38, 0.08);
    aspect-ratio: 16 / 10;
    min-height: 200px;
    margin-bottom: 1.35rem;
  }

  .rk-contact-v5__map iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .rk-contact-v5__cta {
    display: inline-flex;
    align-self: flex-start;
    align-items: center;
    gap: 0.5rem;
    padding: 0.95rem 1.6rem;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #fff;
    background: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 0 4px 0 var(--gold);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .rk-contact-v5__cta:hover,
  .rk-contact-v5__cta:focus-visible {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--gold);
    outline: none;
  }
</style>

<section class="rk-contact-v5" aria-label="Contact">
  <div class="rk-contact-v5__shell">
    <div class="rk-contact-v5__grid">
      <div class="rk-contact-v5__visual">
        <img
          class="rk-contact-v5__logo"
          src="https://i.postimg.cc/QNBPSC3P/upscaled-2x-traced-unnamed.png"
          alt="Restorative Kinetics"
          width="400"
          height="120"
          loading="lazy"
        >
        <div class="rk-contact-v5__photo-cut">
          <img
            src="https://i.postimg.cc/CM9dhPMb/Allie-Training-97.jpg"
            alt="Allie Church"
            width="600"
            height="600"
            loading="lazy"
          >
        </div>
      </div>

      <div class="rk-contact-v5__panel">
        <p class="rk-contact-v5__kicker">Allie Church · Contact</p>
        <h1>Start with a <em>conversation.</em></h1>
        <p class="lead">I’m Allie Church—call, email, or stop by. Whichever fits your day.</p>

        <div class="rk-contact-v5__row">
          <a href="tel:+15555555555">(555) 555-5555</a>
          <span aria-hidden="true" style="color:#ccc;">|</span>
          <a href="mailto:restorativekinetics@gmail.com">restorativekinetics@gmail.com</a>
        </div>

        <address class="rk-contact-v5__address">
          1847 Axtell Gateway Rd<br>
          Gallatin Gateway, MT 59730
        </address>

        <div class="rk-contact-v5__map">
          <iframe
            title="Map: 1847 Axtell Gateway Rd, Gallatin Gateway, MT"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps?q=1847+Axtell+Gateway+Rd,+Gallatin+Gateway,+MT+59730&amp;output=embed"
            allowfullscreen
          ></iframe>
        </div>

        <a
          class="rk-contact-v5__cta"
          href="mailto:restorativekinetics@gmail.com?subject=Free%2060%20min%20consult"
        >Free 60 min consult</a>
      </div>
    </div>
  </div>
</section>
